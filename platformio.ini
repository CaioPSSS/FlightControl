; ============================================================
; VANT Flight Controller - ESP32 Dual-Core FreeRTOS
; Avião Convencional (Tractor) com Cauda Twin-Boom
; ============================================================

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; === Build Flags ===
build_flags = 
    -DCORE_DEBUG_LEVEL=0
    -Wall
    -Wextra
    -O2

; === Dependências ===
lib_deps = 
    mikalhart/TinyGPSPlus@^1.0.3
    sandeepmistry/LoRa@^0.8.0

; === Partições com NVS expandido ===
board_build.partitions = default.csv
